<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Research survey on the influence of loyalty programs on customer purchase behavior — Bachelor's Thesis by Quentin Leopold." />

  <div class="bg-mesh"><i></i></div>
